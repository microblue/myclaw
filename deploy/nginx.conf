# /etc/nginx/sites-available/myclaw
# Symlink to /etc/nginx/sites-enabled/ and run: sudo nginx -t && sudo systemctl reload nginx
#
# Replace SERVER_NAME with your real domain (e.g. myclaw.example.com).

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME;

    # Let Cloudflare / certbot handle TLS termination; this server block is HTTP-only.
    # If you terminate TLS on this box with certbot, re-run:
    #   sudo certbot --nginx -d SERVER_NAME

    root /home/ubuntu/myclaw/apps/web/dist;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:2222/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:2223;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
