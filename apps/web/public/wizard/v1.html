<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claw Easy Setup</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- qrcodejs renders the WeChat QR client-side. Tencent's
     qrcode_img_content field is a URL (not a base64 image), so we encode
     that URL into a QR for the user to scan with their phone. -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1/qrcode.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .card { transition: all 0.15s ease; }
  .card:hover { transform: translateY(-2px); }
</style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen">

<div class="max-w-3xl mx-auto px-4 py-10 sm:py-16">
  <header class="mb-10 flex items-center gap-4">
    <span class="text-5xl">&#129438;</span>
    <div>
      <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight">Claw Easy Setup</h1>
      <p class="text-base text-slate-400 mt-1">Two-minute setup for your private AI</p>
    </div>
  </header>

  <main id="app"></main>

  <footer class="mt-10 text-center text-xs text-slate-500" id="footer"></footer>
</div>

<!-- Save overlay: covers the whole viewport while we're posting + restarting
     the gateway, blocking clicks on every input/button underneath. Toggled
     from render() based on state.busy. -->
<div id="overlay" class="hidden fixed inset-0 z-50 bg-slate-900/85 backdrop-blur-sm flex items-center justify-center" aria-live="polite" aria-busy="true"></div>

<script>
const PRESET_MODELS = [
  { ref: 'openrouter/deepseek/deepseek-v4-flash', label: 'DeepSeek v4 Flash', hint: 'Fast & cheap, good default' },
  { ref: 'openrouter/anthropic/claude-sonnet-4.6', label: 'Claude Sonnet 4.6', hint: 'Strong reasoning, balanced' },
  { ref: 'openrouter/openai/gpt-5', label: 'GPT-5', hint: 'OpenAI flagship' },
  { ref: 'openrouter/google/gemini-2.5-pro', label: 'Gemini 2.5 Pro', hint: 'Long context' },
  { ref: 'openrouter/auto', label: 'Auto-route', hint: 'OpenRouter picks per request' }
]

const TOKEN_KEY = 'myclaw.wizard.token.v1'

function captureToken() {
  const m = location.hash.match(/[#&]t=([^&]+)/)
  if (m) {
    sessionStorage.setItem(TOKEN_KEY, decodeURIComponent(m[1]))
    history.replaceState(null, '', location.pathname + location.search + '#/')
    return sessionStorage.getItem(TOKEN_KEY)
  }
  const stored = sessionStorage.getItem(TOKEN_KEY)
  if (stored) return stored
  // Last resort: same-origin Control UI stashes the gateway token in
  // sessionStorage under `openclaw.control.token.v1:wss://<host>` once
  // the user has signed in there. If they're already in the Control UI
  // tab, picking up that value lets the wizard skip the paste-token
  // dance.
  const wsKey = 'openclaw.control.token.v1:wss://' + location.host
  const inherited = sessionStorage.getItem(wsKey)
  if (inherited) {
    sessionStorage.setItem(TOKEN_KEY, inherited)
    return inherited
  }
  return null
}

let token = captureToken()

function adoptToken(value) {
  const trimmed = (value || '').trim()
  if (!trimmed) return false
  sessionStorage.setItem(TOKEN_KEY, trimmed)
  token = trimmed
  refreshStatus()
  return true
}

function logout() {
  sessionStorage.removeItem(TOKEN_KEY)
  token = null
  state.status = null
  render()
}
const app = document.getElementById('app')
const footer = document.getElementById('footer')
let state = { status: null, busy: false, saving: false, error: null, loading: false, wechatQr: null, wechatStatus: 'idle', orCatalog: null }

const OR_CATALOG_KEY = 'myclaw.wizard.orCatalog.v1'
const OR_CATALOG_TTL_MS = 86400_000

async function loadOrCatalog() {
  try {
    const raw = localStorage.getItem(OR_CATALOG_KEY)
    if (raw) {
      const cached = JSON.parse(raw)
      if (cached && Date.now() - cached.ts < OR_CATALOG_TTL_MS && Array.isArray(cached.models)) {
        state.orCatalog = cached.models
        if (location.hash === '#/model') render()
        return
      }
    }
  } catch { /* corrupt cache, refetch */ }
  try {
    const r = await fetch('https://openrouter.ai/api/v1/models')
    if (!r.ok) return
    const data = await r.json()
    const models = (data.data || [])
      .map(m => ({ id: 'openrouter/' + (m.id || ''), name: m.name || m.id || '' }))
      .filter(m => m.id && m.name)
      .sort((a, b) => a.name.localeCompare(b.name))
    if (models.length === 0) return
    state.orCatalog = models
    try {
      localStorage.setItem(OR_CATALOG_KEY, JSON.stringify({ ts: Date.now(), models }))
    } catch { /* quota exceeded — fine, just don't cache */ }
    if (location.hash === '#/model') render()
  } catch { /* network error — fine, presets still work */ }
}

async function api(path, opts = {}) {
  const r = await fetch('/myclaw/api' + path, {
    method: opts.method || 'GET',
    headers: {
      'content-type': 'application/json',
      ...(token ? { authorization: 'Bearer ' + token } : {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  })
  const text = await r.text()
  let data
  try { data = JSON.parse(text) } catch { data = { ok: r.ok, raw: text } }
  if (!r.ok) throw new Error(data.error || data.raw || ('HTTP ' + r.status))
  return data
}

async function refreshStatus() {
  state.loading = true
  state.error = null
  render()
  try {
    state.status = await api('/status')
    state.error = null
  } catch (e) {
    state.error = e.message
  } finally {
    state.loading = false
  }
  render()
}

function setBusy(b) { state.busy = b; render() }
function setSaving(b) { state.saving = b; state.busy = b; render() }

function navigate(hash) {
  if (location.hash !== hash) location.hash = hash
  else render()
}

window.addEventListener('hashchange', render)

// ── Pages ────────────────────────────────────────────

function pageNoAuth() {
  return `
    <div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-2xl">&#128274;</span>
        <h2 class="text-lg font-semibold">Sign in</h2>
      </div>
      <p class="text-slate-400 text-sm mb-4">Paste your <strong>gateway token</strong> below to unlock setup. The token is the same value the OpenClaw Control UI asks for.</p>
      <form id="tokenForm" class="space-y-3">
        <input type="password" name="token" required autofocus placeholder="gateway token (64 hex chars)" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono" />
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2.5 rounded-lg">Unlock</button>
      </form>
      <details class="mt-5 text-xs text-slate-500">
        <summary class="cursor-pointer hover:text-slate-300">Where do I find the token?</summary>
        <ul class="mt-2 space-y-1 pl-4 list-disc">
          <li>Easiest: open <a href="https://myclaw.one/claws" class="text-sky-400 hover:underline">myclaw.one/claws</a>, pick this claw, click <strong>Easy Setup</strong> &mdash; you'll arrive here pre-signed-in.</li>
          <li>Already signed into the Control UI in another tab on this domain? Refresh this page &mdash; the wizard will pick up that session.</li>
          <li>SSH: <code class="bg-slate-900 px-1 rounded">cat /home/openclaw/.openclaw/openclaw.json</code> &rarr; <code class="bg-slate-900 px-1 rounded">gateway.auth.token</code>.</li>
        </ul>
      </details>
    </div>
  `
}

function pageHome() {
  const s = state.status
  const pending = s === null
  const checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="M5 13l4 4L19 7"/></svg>'
  const unlinkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 4.54 7.1"/><path d="M8 12h3"/><path d="M2 2l20 20"/></svg>'
  const dotsSvg = '<span class="text-2xl leading-none">&hellip;</span>'

  const statusBadge = (ok) => {
    if (pending) return `<span class="inline-flex w-14 h-14 rounded-full bg-slate-700 text-slate-400 items-center justify-center shrink-0">${dotsSvg}</span>`
    if (ok) return `<span class="inline-flex w-14 h-14 rounded-full bg-emerald-500/15 text-emerald-400 items-center justify-center shrink-0">${checkSvg}</span>`
    return `<span class="inline-flex w-14 h-14 rounded-full bg-rose-500/10 text-rose-400 items-center justify-center shrink-0" title="Not connected">${unlinkSvg}</span>`
  }

  const sectionTitle = (text) => `<h2 class="text-2xl sm:text-3xl font-semibold text-slate-100 mt-12 mb-5 first:mt-0">${text}</h2>`

  const stepCard = (id, title, subtitle, ok) => `
    <button data-nav="#/${id}" ${pending ? 'disabled' : ''} class="card w-full text-left bg-slate-800 hover:bg-slate-700 rounded-2xl p-6 flex items-center justify-between border border-slate-700 ${pending ? 'opacity-70 cursor-wait' : ''}">
      <div class="flex items-center gap-5">
        ${statusBadge(ok)}
        <div>
          <div class="text-xl font-semibold text-slate-100">${title}</div>
          <div class="text-sm text-slate-400 mt-1">${subtitle}</div>
        </div>
      </div>
      <span class="text-slate-500 text-xl">&rarr;</span>
    </button>`

  const channelCard = (id, title, subtitle, ok, badge) => `
    <button data-nav="#/${id}" ${pending ? 'disabled' : ''} class="card relative w-full text-left bg-slate-800 hover:bg-slate-700 rounded-2xl p-5 flex flex-col gap-4 border border-slate-700 ${pending ? 'opacity-70 cursor-wait' : ''}">
      ${badge ? `<span class="absolute top-3 right-3 inline-flex items-center gap-1 text-[11px] font-semibold uppercase tracking-wider bg-rose-500/15 text-rose-300 border border-rose-500/30 rounded-full px-2.5 py-1">${badge}</span>` : ''}
      <div class="flex items-center justify-between">
        ${statusBadge(ok)}
        <span class="text-slate-500 text-xl">&rarr;</span>
      </div>
      <div>
        <div class="text-lg font-semibold text-slate-100">${title}</div>
        <div class="text-sm text-slate-400 mt-1">${subtitle}</div>
      </div>
    </button>`

  const modelOk = !pending && !!s.model?.primary && !!s.model?.hasOpenRouterKey
  const modelSubtitle = pending
    ? 'Checking&hellip;'
    : (s.model?.primary || 'Not configured')
  const tgOk = !pending && !!s.telegram?.connected
  const tgSubtitle = pending
    ? 'Checking&hellip;'
    : (s.telegram?.connected ? 'Bot connected' : (s.telegram?.configured ? 'Configured, not yet running' : 'Not connected'))
  const wxOk = !pending && !!s.wechat?.connected
  const wxSubtitle = pending
    ? 'Checking&hellip;'
    : (s.wechat?.connected ? 'Account connected' : (s.wechat?.installed ? 'Plugin ready — scan QR to bind' : 'Plugin not installed'))

  return `
    ${sectionTitle('Step 1 &middot; Pick a model')}
    ${stepCard('model', 'Pick a model', modelSubtitle, modelOk)}
    ${sectionTitle('Step 2 &middot; Channels Setting')}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      ${channelCard('telegram', 'Connect Telegram', tgSubtitle, tgOk, null)}
      ${channelCard('wechat', 'Connect WeChat', wxSubtitle, wxOk, '&#127464;&#127475; China Mainland Only')}
    </div>`
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
}

function pageModel() {
  const s = state.status || {}
  const current = s.model?.primary || ''
  const hasKey = s.model?.hasOpenRouterKey
  const isPreset = PRESET_MODELS.some(m => m.ref === current)
  const radios = PRESET_MODELS.map(m => `
    <label class="card flex items-start gap-3 p-3 bg-slate-800 hover:bg-slate-700 rounded-lg cursor-pointer border border-slate-700">
      <input type="radio" name="model" value="${m.ref}" ${m.ref === current ? 'checked' : ''} class="mt-1" />
      <div class="flex-1">
        <div class="font-medium">${m.label}</div>
        <div class="text-xs text-slate-400">${m.hint}</div>
        <div class="text-xs text-slate-500 font-mono mt-1">${m.ref}</div>
      </div>
    </label>`).join('')
  const customDefault = !isPreset && current ? current : ''
  const catalog = state.orCatalog || []
  // Most browsers cap useful datalist render at a few hundred entries; the
  // openrouter catalog is ~300, well within budget. Fallback if fetch failed:
  // the input still accepts any pasted ref.
  const catalogOptions = catalog
    .map(m => `<option value="${escapeHtml(m.id)}">${escapeHtml(m.name)}</option>`)
    .join('')
  const catalogHint = catalog.length > 0
    ? `${catalog.length} models — type to filter`
    : 'Catalog unavailable; paste any openrouter/&lt;provider&gt;/&lt;model&gt; ref'
  return `
    <div class="mb-6">
      <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to setup</a>
    </div>
    <h2 class="text-2xl sm:text-3xl font-semibold tracking-tight mb-2">Pick a model</h2>
    <p class="text-base text-slate-400 mb-6">All models are routed through OpenRouter. ${hasKey ? 'Your API key is already saved.' : 'Add your OpenRouter key below.'}</p>
    <form id="modelForm" class="space-y-2">
      ${radios}
      <div class="pt-3 border-t border-slate-700">
        <label class="block text-sm text-slate-300 mb-1 mt-3">Or any other OpenRouter model <span class="text-xs text-slate-500">(${catalogHint})</span></label>
        <input type="text" name="customModel" list="orCatalogList" value="${escapeHtml(customDefault)}" autocomplete="off" placeholder="openrouter/anthropic/claude-opus-4" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono" />
        <datalist id="orCatalogList">${catalogOptions}</datalist>
        <p class="text-xs text-slate-500 mt-1">Leave blank to use the preset above. Browse all at <a href="https://openrouter.ai/models" target="_blank" class="text-sky-400 hover:underline">openrouter.ai/models &rarr;</a></p>
      </div>
      <div class="pt-3">
        <label class="block text-sm text-slate-300 mb-1">OpenRouter API key ${hasKey ? '<span class="text-xs text-slate-500">(leave blank to keep current)</span>' : '<span class="text-xs text-rose-400">(required)</span>'}</label>
        <input type="password" name="apiKey" placeholder="sk-or-v1-&hellip;" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono" />
        <a href="https://openrouter.ai/keys" target="_blank" class="text-xs text-sky-400 hover:underline">Get a key &rarr;</a>
      </div>
      <button type="submit" ${state.busy ? 'disabled' : ''} class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-medium py-2.5 rounded-lg">
        ${state.busy ? 'Saving&hellip;' : 'Save & restart gateway'}
      </button>
    </form>
  `
}

function pageTelegram() {
  const s = state.status || {}
  return `
    <div class="mb-6">
      <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to setup</a>
    </div>
    <h2 class="text-2xl sm:text-3xl font-semibold tracking-tight mb-2">Connect Telegram</h2>
    <ol class="text-base text-slate-400 list-decimal pl-5 mb-6 space-y-2">
      <li>Open <a href="https://t.me/BotFather" target="_blank" class="text-sky-400 hover:underline">@BotFather</a> on Telegram, send <code class="bg-slate-800 px-1 rounded">/newbot</code>, copy the token.</li>
      <li>Find your Telegram numeric ID via <a href="https://t.me/userinfobot" target="_blank" class="text-sky-400 hover:underline">@userinfobot</a>.</li>
    </ol>
    <form id="telegramForm" class="space-y-3">
      <div>
        <label class="block text-sm mb-1">Bot token</label>
        <input type="password" name="token" required placeholder="123456:ABC-DEF&hellip;" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono" />
      </div>
      <div>
        <label class="block text-sm mb-1">Your Telegram user ID(s) <span class="text-xs text-slate-500">(comma-separated)</span></label>
        <input type="text" name="allowedUsers" required placeholder="123456789" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm font-mono" />
      </div>
      <button type="submit" ${state.busy ? 'disabled' : ''} class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-medium py-2.5 rounded-lg">
        ${state.busy ? 'Connecting&hellip;' : 'Save & connect'}
      </button>
    </form>
    ${s.telegram?.connected ? '<p class="text-xs text-emerald-400 mt-3">&check; Currently connected. Saving will reconnect with the new credentials.</p>' : ''}
  `
}

function pageWechat() {
  const s = state.status || {}
  if (s.wechat?.connected) {
    return `
      <div class="mb-4">
        <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back</a>
      </div>
      <div class="bg-emerald-900/30 border border-emerald-700 rounded-xl p-6 text-center">
        <div class="text-4xl mb-2">&check;</div>
        <h2 class="text-lg font-semibold mb-1">WeChat connected</h2>
        <p class="text-sm text-slate-400">Send a message to your bound account to test it.</p>
      </div>
    `
  }
  if (state.wechatQr) {
    const qrStatus = s.wechat?.qrSession?.status
    const footer = qrStatus === 'scaned'
      ? '<p class="text-xs text-emerald-400 text-center">&check; Scanned — confirm on your phone to finish</p>'
      : '<p class="text-xs text-slate-500 text-center">Waiting for scan&hellip; (refreshes every 3s)</p>'
    return `
      <div class="mb-4">
        <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back</a>
      </div>
      <h2 class="text-2xl sm:text-3xl font-semibold tracking-tight mb-2">Scan with WeChat</h2>
      <p class="text-base text-slate-400 mb-6">Open WeChat on your phone &rarr; tap <strong>+</strong> &rarr; <strong>Scan</strong>, then point at the code below.</p>
      <div class="bg-white p-6 rounded-lg flex items-center justify-center mb-4">
        <div id="qrTarget" class="w-64 h-64"></div>
      </div>
      ${footer}
    `
  }
  return `
    <div class="mb-6">
      <a href="#/" class="text-sm text-slate-400 hover:text-slate-200">&larr; Back to setup</a>
    </div>
    <div class="mb-5 inline-flex items-center gap-2 text-xs font-semibold uppercase tracking-wider bg-rose-500/15 text-rose-300 border border-rose-500/30 rounded-full px-3 py-1.5">&#127464;&#127475; China Mainland Only</div>
    <h2 class="text-2xl sm:text-3xl font-semibold tracking-tight mb-2">Connect WeChat</h2>
    <p class="text-base text-slate-400 mb-6">${state.wechatStatus === 'fetching' ? 'Fetching QR code from WeChat&hellip;' : (state.wechatStatus === 'error' ? 'Failed to fetch QR. Click below to retry.' : 'Click below to start a login session.')}</p>
    <button id="wechatStartBtn" ${state.busy ? 'disabled' : ''} class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-medium py-2.5 rounded-lg">
      ${state.busy ? 'Loading QR&hellip;' : 'Show QR'}
    </button>
  `
}

// ── Render + bind ────────────────────────────────────

const overlay = document.getElementById('overlay')
function renderOverlay() {
  const initialLoading = state.loading && !state.status && token
  if (state.saving) {
    overlay.innerHTML = `
      <div class="flex flex-col items-center gap-4 px-6 text-center max-w-sm">
        <span class="inline-block w-14 h-14 border-4 border-slate-700 border-t-emerald-400 rounded-full animate-spin"></span>
        <div class="text-lg font-semibold text-slate-100">Saving config &amp; restarting OpenClaw gateway</div>
        <div class="text-sm text-slate-400">This usually takes ~15 seconds. Please wait&hellip;</div>
      </div>`
    overlay.classList.remove('hidden')
    document.body.style.overflow = 'hidden'
  } else if (initialLoading) {
    overlay.innerHTML = `
      <div class="flex flex-col items-center gap-4 px-6 text-center max-w-sm">
        <span class="inline-block w-14 h-14 border-4 border-slate-700 border-t-sky-400 rounded-full animate-spin"></span>
        <div class="text-lg font-semibold text-slate-100">Reading your config&hellip;</div>
        <div class="text-sm text-slate-400">Talking to your claw — this takes a second or two.</div>
      </div>`
    overlay.classList.remove('hidden')
    document.body.style.overflow = 'hidden'
  } else {
    overlay.innerHTML = ''
    overlay.classList.add('hidden')
    document.body.style.overflow = ''
  }
}

function render() {
  renderOverlay()
  if (!token) {
    app.innerHTML = pageNoAuth()
    footer.innerHTML = ''
    const tokenForm = document.getElementById('tokenForm')
    if (tokenForm) tokenForm.addEventListener('submit', onTokenSubmit)
    return
  }
  const hash = location.hash || '#/'
  let html
  if (hash === '#/model') html = pageModel()
  else if (hash === '#/telegram') html = pageTelegram()
  else if (hash === '#/wechat') html = pageWechat()
  else html = pageHome()

  const banner = state.error
    ? `<div class="mb-4 p-3 bg-rose-900/40 border border-rose-700 rounded-lg text-sm text-rose-200">${state.error}</div>`
    : ''
  app.innerHTML = banner + html
  footer.innerHTML = `
    <a href="/index.html#token=${encodeURIComponent(token)}" class="hover:text-slate-300">Open OpenClaw Web Control &rarr;</a>
    <span class="mx-2 text-slate-700">|</span>
    <a href="#" id="logoutLink" class="hover:text-slate-300">Sign out</a>
  `

  app.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.nav))
  })

  const modelForm = document.getElementById('modelForm')
  if (modelForm) modelForm.addEventListener('submit', onModelSubmit)
  const telegramForm = document.getElementById('telegramForm')
  if (telegramForm) telegramForm.addEventListener('submit', onTelegramSubmit)
  const wechatStartBtn = document.getElementById('wechatStartBtn')
  if (wechatStartBtn) wechatStartBtn.addEventListener('click', onWechatStart)
  const logoutLink = document.getElementById('logoutLink')
  if (logoutLink) logoutLink.addEventListener('click', (e) => { e.preventDefault(); logout() })

  // Tencent gives us a URL in `qrcode_img_content`; render it into a QR
  // image in-browser. qrcodejs appends a canvas + img to the target,
  // so clear first to avoid stacking on re-render.
  const qrTarget = document.getElementById('qrTarget')
  if (qrTarget && state.wechatQr && typeof QRCode !== 'undefined') {
    qrTarget.innerHTML = ''
    new QRCode(qrTarget, {
      text: state.wechatQr,
      width: 256,
      height: 256,
      correctLevel: QRCode.CorrectLevel.M
    })
  }
}

function onTokenSubmit(e) {
  e.preventDefault()
  const fd = new FormData(e.target)
  const value = (fd.get('token') || '').toString()
  if (!adoptToken(value)) {
    state.error = 'Token cannot be empty'
    render()
  }
}

// ── Handlers ────────────────────────────────────────

async function onModelSubmit(e) {
  e.preventDefault()
  const fd = new FormData(e.target)
  const custom = (fd.get('customModel') || '').toString().trim()
  const model = custom || fd.get('model')
  const apiKey = (fd.get('apiKey') || '').toString().trim()
  if (!model) { state.error = 'Pick a model or paste a custom ref'; render(); return }
  if (custom && !custom.startsWith('openrouter/')) {
    state.error = 'Custom model ref must start with "openrouter/" (e.g. openrouter/anthropic/claude-opus-4)'
    render()
    return
  }
  state.error = null
  setSaving(true)
  try {
    await api('/model', { method: 'POST', body: { model, apiKey: apiKey || undefined } })
    await refreshStatus()
    navigate('#/')
  } catch (err) {
    state.error = err.message
  } finally {
    setSaving(false)
  }
}

async function onTelegramSubmit(e) {
  e.preventDefault()
  const fd = new FormData(e.target)
  const tok = (fd.get('token') || '').toString().trim()
  const allowedUsers = (fd.get('allowedUsers') || '').toString().split(',').map(s => s.trim()).filter(Boolean)
  if (!tok || allowedUsers.length === 0) { state.error = 'Token and at least one user ID required'; render(); return }
  state.error = null
  setSaving(true)
  try {
    await api('/telegram', { method: 'POST', body: { token: tok, allowedUsers } })
    await refreshStatus()
    navigate('#/')
  } catch (err) {
    state.error = err.message
  } finally {
    setSaving(false)
  }
}

async function onWechatStart() {
  state.error = null
  state.wechatStatus = 'fetching'
  setBusy(true)
  try {
    const res = await api('/wechat/start', { method: 'POST' })
    state.wechatQr = res.qr
    state.wechatStatus = 'ready'
    pollWechat()
  } catch (err) {
    state.error = err.message
    state.wechatStatus = 'error'
  } finally {
    setBusy(false)
  }
}

let wechatPollTimer = null
function pollWechat() {
  clearTimeout(wechatPollTimer)
  wechatPollTimer = setTimeout(async () => {
    try {
      await refreshStatus()
      const w = state.status?.wechat
      const qr = w?.qrSession
      if (w?.connected) {
        state.wechatQr = null
        state.wechatStatus = 'idle'
        render()
        return
      }
      if (qr?.status === 'expired' || qr?.status === 'error') {
        state.wechatQr = null
        state.wechatStatus = qr.status
        state.error = qr.error || (qr.status === 'expired' ? 'QR expired — click Show QR again' : 'WeChat login failed')
        render()
        return
      }
      pollWechat()
    } catch {
      pollWechat()
    }
  }, 3000)
}

// ── Boot ────────────────────────────────────────────

if (token) {
  refreshStatus()
  loadOrCatalog()
} else {
  render()
}
</script>
